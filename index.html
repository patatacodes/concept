<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .gallery-item {
            position: relative;
            width: 100%;
            height: auto;
            transition: transform 0.7s, filter 0.7s;
            overflow: hidden;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
        }
        .gallery-item:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .gallery-item:hover .overlay {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="gallery-item">
            <img src="lira.png" alt="Lira Art">
            <div class="overlay"><h2>Lira</h2></div>
        </div>
        <div class="gallery-item">
            <img src="lotus.png" alt="Lotus Art">
            <div class="overlay"><h2>Lotus</h2></div>
        </div>
        <div class="gallery-item">
            <img src="patata.png" alt="Patata Art">
            <div class="overlay"><h2>Patata</h2></div>
        </div>
        <div class="gallery-item">
            <img src="torio.png" alt="Torio Art">
            <div class="overlay"><h2>Torio</h2></div>
        </div>
    </div>
</body>
</html>
